name: Post Agent Session

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to run workflows on'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  trigger-workflows:
    name: Trigger PR Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh pr view "${{ inputs.pr_number }}" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Trigger CI workflow on PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ steps.pr.outputs.branch }}"
